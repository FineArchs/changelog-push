name: Publish Dist Branch

on:
  push:
    branches:
      - main
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare bundle
        run: |
          mkdir bundle
          cp -r dist bundle/
          cp package.json README.md package-lock.json bundle/
          # Optional: Add .gitignore to bundle to exclude node_modules if needed
          echo "node_modules/" > bundle/.gitignore

      - name: Deploy to dist branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: bundle
          branch: dist
          clean: true
